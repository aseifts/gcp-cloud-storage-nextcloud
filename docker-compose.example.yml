version: '3'

services:
  db:
    image: mariadb:10.6
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    restart: always
    volumes:
      - db:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud

  app:
    image: nextcloud:latest
    restart: always
    ports:
      - 8080:80
    links:
      - db
    volumes:
      - nextcloud:/var/www/html
    environment:
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_HOST=db
      # GCS Interoperability (S3 API)
      - OBJECTSTORE_S3_BUCKET=${GCS_BUCKET_NAME}
      - OBJECTSTORE_S3_KEY=${GCS_ACCESS_KEY}
      - OBJECTSTORE_S3_SECRET=${GCS_SECRET_KEY}
      - OBJECTSTORE_S3_REGION=us-central1
      - OBJECTSTORE_S3_HOSTNAME=storage.googleapis.com
      - OBJECTSTORE_S3_PORT=443
      - OBJECTSTORE_S3_USEPATHSTYLE=true

volumes:
  nextcloud:
  db:
